<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            width: 100vw;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            width:clamp(300px,90vw,1000px);
            border: 2px solid rgb(21, 21, 48);
            display: grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:10px;
            padding: 10px;
        }
        .member{
            height:clamp(250px,50dvh,300px);
            border: 2px solid rgb(21, 21, 48); 
            border-radius: 20px;
            
        }
        .ismail{
            background-image: url("images/file_00000000bc4c72438e3e4fb6887ca04e.png");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            padding-top: 50px;
        }
        .balan{
            background-image: url("images/file_000000002b2472439bf501e6e8f0abc9.png");
            background-position: center;

            background-size: cover;
            padding-top: 50px;
        }

        }

            background-image: url("images/file_0000000043587243b450c5ac9fa9c1fb.png");
            background-position: center;

        }

        }

            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            padding-top: 50px;
        }
        .mujit{

</html>
